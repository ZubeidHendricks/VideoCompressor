# Generated by AppFactoryKit appgen. Run: xcodegen generate
name: VideoCompressor
options:
  bundleIdPrefix: com.zubeid
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  AppFactoryKit:
    url: https://github.com/ZubeidHendricks/AppFactoryKit
    from: "0.1.0"

targets:
  VideoCompressor:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources
    dependencies:
      - package: AppFactoryKit
        product: AppFactoryKit
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "Video Compressor"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSCameraUsageDescription: "VideoCompressor uses the camera to capture and process your content."
        NSPhotoLibraryUsageDescription: "VideoCompressor needs access to your photos to import and process images."
        NSPhotoLibraryAddUsageDescription: "VideoCompressor saves your results to your photo library."
        NSMicrophoneUsageDescription: "VideoCompressor uses the microphone to record and process audio."
    settings:
      base:
        PRODUCT_NAME: VideoCompressor
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.videocompressor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  VideoCompressorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - path: Sources/CompressService.swift
    settings:
      base:
        PRODUCT_NAME: VideoCompressorTests
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.videocompressor.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"

schemes:
  Tests:
    build:
      targets:
        VideoCompressorTests: [test]
    test:
      targets:
        - VideoCompressorTests
